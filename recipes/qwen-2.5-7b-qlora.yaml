# Model arguments
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
tokenizer_name_or_path: Qwen/Qwen2.5-7B-Instruct
model_revision: main

torch_dtype: bfloat16         # or float16, depending on your hardware
attn_implementation: flash_attention_2  # OPTIONAL: if supported by Qwen and you have FlashAttention 2
use_liger: false              # Set to false unless you know Qwen supports it (Liger is LLaMA-specific)
bf16: true                    # Set to true if your GPU supports bfloat16
tf32: true                    # Optional, speeds up matmul on A100/RTX with less precision
output_dir: runs/qwen-2-5-7b-sft-4

# Dataset arguments
dataset_id_or_path: input_data/training_dataset.json
max_seq_length: 1024
packing: true

# LoRA arguments
use_peft: true
load_in_4bit: true
lora_target_modules:
  - "self_attn.q_proj"
  - "self_attn.k_proj"
  - "self_attn.v_proj"
  - "self_attn.o_proj"
  - "mlp.gate_proj"
  - "mlp.down_proj"
  - "mlp.up_proj"
# important as we need to train the special tokens for the chat template of llama 
lora_modules_to_save:
  - "lm_head"
  - "model.embed_tokens"  # Or sometimes "transformer.wte" for GPT-like Qwen

lora_r: 16
lora_alpha: 16  


# Training arguments
num_train_epochs: 1
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 2.0e-4 
lr_scheduler_type: constant
warmup_ratio: 0.1

# Logging arguments
logging_strategy: steps
logging_steps: 5
report_to:
- tensorboard
save_strategy: "no"
seed: 42

# Hugging Face Hub 
push_to_hub: false
# hub_model_id: llama-3-1-8b-math-orca-qlora-10k-ep1 # if not defined same as output_dir
hub_strategy: every_save
resume_from_checkpoint: null